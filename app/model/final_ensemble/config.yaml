ensemble:
  method: rank_average
  weights:
    lgbm_ranker: 0.5
    lgbm_regressor: 0.3
    rule_model: 0.2
features:
  use_alpha: true
  use_base: true
  use_cross_section: true
  use_market: true
  use_technical: true
  windows:
  - 3
  - 5
  - 10
  - 20
  - 30
  - 60
general:
  device: auto
  log_level: INFO
  num_workers: 4
  seed: 2026
models:
- active: true
  config_path: ./stock_pred/src/config/lgb_ranker.yaml
  type: lgbm_ranker
- active: true
  config_path: ./stock_pred/src/config/lgb_regressor.yaml
  type: lgbm_regressor
- active: true
  config_path: ./stock_pred/src/config/rule_model.yaml
  type: rule_model
paths:
  data_dir: C:\Users\xyq\Desktop\dl\challenge2\app\data
  model_dir: C:\Users\xyq\Desktop\dl\challenge2\app\model
  output_dir: C:\Users\xyq\Desktop\dl\challenge2\app\output
  report_dir: C:\Users\xyq\Desktop\dl\challenge2\app\reports
  temp_dir: C:\Users\xyq\Desktop\dl\challenge2\app\temp
  train_file: C:\Users\xyq\Desktop\dl\challenge2\app\data\train.csv
